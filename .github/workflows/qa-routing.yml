name: QA routing

# Reusable workflow — called from a thin wrapper in each consuming repo.
# Reads the merged PR's body for GitHub's own closing keywords (Closes/Fixes/
# Resolves #N), relabels those issues status:ready-for-qa, and assigns
# everyone listed in that repo's .github/QAOWNERS. See README.md for the
# wrapper snippet and QAOWNERS format.

on:
  workflow_call:
    inputs:
      runner:
        description: 'JSON array of runner labels, e.g. ["ubuntu-latest"] or ["self-hosted","qa-routing"]'
        type: string
        default: '["ubuntu-latest"]'

permissions:
  issues: write
  contents: read

jobs:
  route-to-qa:
    runs-on: ${{ fromJSON(inputs.runner) }}
    steps:
      - name: Relabel and assign linked issues to QA
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';

            // Strip HTML comments so template instructions/examples aren't parsed as
            // issue refs, then pull out issue numbers from GitHub's own closing-keyword
            // syntax: "Closes/Fixes/Resolves #N" (and comma/"and"-separated lists like
            // "Closes #10, #11"). The keyword must sit immediately next to the "#N" list,
            // same as GitHub's own auto-close matching, so prose like "fixes a bug, see
            // #123" or a plain "Refs #123" cross-link doesn't get swept in.
            const withoutComments = body.replace(/<!--[\s\S]*?-->/g, '');
            const closingKeywordRe = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\b((?:\s*,?\s*(?:and\s+)?#\d+)+)/gi;
            const issueNumbers = [...new Set(
              [...withoutComments.matchAll(closingKeywordRe)]
                .flatMap(m => [...m[1].matchAll(/#(\d+)/g)].map(n => parseInt(n[1], 10)))
            )];

            if (issueNumbers.length === 0) {
              core.info('No Closes/Fixes/Resolves keywords found in the PR body — nothing to route.');
              return;
            }

            let qaOwners = [];
            try {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: '.github/QAOWNERS',
              });
              qaOwners = Buffer.from(data.content, 'base64')
                .toString('utf8')
                .split(/\r?\n/)
                .map(l => l.replace(/#.*$/, '').trim())
                .filter(l => l)
                .map(l => l.replace(/^@/, ''));
            } catch (err) {
              if (err.status === 404) {
                core.warning('No .github/QAOWNERS file in this repo — issues will be relabeled but left unassigned.');
              } else {
                throw err;
              }
            }

            for (const issue_number of issueNumbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                });

                const keepLabels = issue.labels
                  .map(l => (typeof l === 'string' ? l : l.name))
                  .filter(name => !name.startsWith('status:'));

                await github.rest.issues.setLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                  labels: [...keepLabels, 'status:ready-for-qa'],
                });

                if (qaOwners.length > 0) {
                  await github.rest.issues.addAssignees({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number,
                    assignees: qaOwners,
                  });
                }

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                  body: `Merged in #${context.payload.pull_request.number} — ready for QA.` +
                        (qaOwners.length > 0
                          ? ` Assigned: ${qaOwners.map(o => '@' + o).join(', ')}.`
                          : ' No QAOWNERS configured — unassigned.'),
                });
              } catch (err) {
                core.warning(`Could not route issue #${issue_number}: ${err.message}`);
              }
            }
