name: QA routing

# Reusable workflow — called from a thin wrapper in each consuming repo.
# Reads the issue numbers listed under the merged PR's "## Verification"
# section, relabels those issues status:ready-for-qa, and assigns everyone
# listed in that repo's .github/QAOWNERS. See README.md for the wrapper
# snippet and QAOWNERS format.

on:
  workflow_call:
    inputs:
      runner:
        description: 'JSON array of runner labels, e.g. ["ubuntu-latest"] or ["self-hosted","qa-routing"]'
        type: string
        default: '["ubuntu-latest"]'

permissions:
  issues: write
  contents: read

jobs:
  route-to-qa:
    runs-on: ${{ fromJSON(inputs.runner) }}
    steps:
      - name: Relabel and assign linked issues to QA
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';

            // Grab everything under "## Verification" up to the next "## " heading (or EOF),
            // strip HTML comments so template instructions don't get parsed as issue refs,
            // and pull out every #N in what's left.
            const sectionMatch = body.match(/^##\s*Verification\s*$([\s\S]*?)(?=^##\s|(?![\s\S]))/im);
            const section = sectionMatch ? sectionMatch[1].replace(/<!--[\s\S]*?-->/g, '') : '';
            const issueNumbers = [...new Set([...section.matchAll(/#(\d+)/g)]
              .map(m => parseInt(m[1], 10)))];

            if (issueNumbers.length === 0) {
              core.info('No issue numbers found under the "## Verification" section — nothing to route.');
              return;
            }

            let qaOwners = [];
            try {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: '.github/QAOWNERS',
              });
              qaOwners = Buffer.from(data.content, 'base64')
                .toString('utf8')
                .split(/\r?\n/)
                .map(l => l.replace(/#.*$/, '').trim())
                .filter(l => l)
                .map(l => l.replace(/^@/, ''));
            } catch (err) {
              if (err.status === 404) {
                core.warning('No .github/QAOWNERS file in this repo — issues will be relabeled but left unassigned.');
              } else {
                throw err;
              }
            }

            for (const issue_number of issueNumbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                });

                const keepLabels = issue.labels
                  .map(l => (typeof l === 'string' ? l : l.name))
                  .filter(name => !name.startsWith('status:'));

                await github.rest.issues.setLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                  labels: [...keepLabels, 'status:ready-for-qa'],
                });

                if (qaOwners.length > 0) {
                  await github.rest.issues.addAssignees({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number,
                    assignees: qaOwners,
                  });
                }

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                  body: `Merged in #${context.payload.pull_request.number} — ready for QA.` +
                        (qaOwners.length > 0
                          ? ` Assigned: ${qaOwners.map(o => '@' + o).join(', ')}.`
                          : ' No QAOWNERS configured — unassigned.'),
                });
              } catch (err) {
                core.warning(`Could not route issue #${issue_number}: ${err.message}`);
              }
            }
