name: Feature
description: Outcome-level work that will be broken down into Stories
type: feature
labels:
  - "needs-triage"
body:
  - type: markdown
    attributes:
      value: |
        Features describe an **outcome**, not implementation — they're a container
        for Stories, not something worked on directly. Keep this light; break the
        real work into Story sub-issues once this is triaged.

  - type: textarea
    id: outcome
    attributes:
      label: Outcome
      description: What changes for the business or the user once this is delivered? Why now?
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: Success criteria, child Story sub-issues, notes / open questions.
      placeholder: |
        Success criteria:
        - …
        - …

        Stories:
        - [ ] #

        Notes / open questions:
    validations:
      required: true
