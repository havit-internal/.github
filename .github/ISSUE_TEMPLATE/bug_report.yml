name: Bug report
description: Something broken in dev, staging, or production
title: "[Bug] "
type: bug
labels:
  - "needs-triage"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Fill in the fields below so QA can reproduce and verify the fix.

  - type: input
    id: environment
    attributes:
      label: Environment
      description: URL / branch / commit SHA / browser + OS as relevant
      placeholder: "https://app.havit.cz  ·  main @ 3a4b1c2  ·  Chrome 128 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: Steps to reproduce, expected vs. actual behavior, evidence (screenshots, stack traces, logs), and related work.
      placeholder: |
        1. Navigate to …
        2. Click …
        3. Observe …

        Expected: …
        Actual: …
    validations:
      required: true
